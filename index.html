<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="generate-pw-container">
        <h1 class="title">Generate a <span class="accent-txt">random password</span></h1>
        <p class="subtitle">Never use an insecure password again.</p>
        
        <div class="actions">
            <button class="generate-passwords-btn">⚡ Generate Passwords</button>
            <div class="length-control">
                <label for="pw-length">Length:</label>
                <input type="number" id="pw-length" min="8" max="24" value="12" class="change-password-length">
            </div>
        </div>
        
        <div class="display-passwords-container">
            <div class="pw-display" title="Click to copy!"></div>
            <div class="pw-display" title="Click to copy!"></div>
            <div class="pw-display" title="Click to copy!"></div>
            <div class="pw-display" title="Click to copy!"></div>
        </div>

        <div id="toast" class="toast">Copied to clipboard! 📋</div>
    </div>

    <script src="index.js"></script>
</body>
</html>
